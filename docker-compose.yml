# docker-compose.yml
#
# Simulates the full Fargate deployment locally.
#
# Services:
#   localstack  – AWS API emulator (ECS, ECR, CloudWatch Logs, Secrets Manager)
#   kafka       – Apache Kafka (KRaft mode, no Zookeeper)
#   redis       – Redis 7
#   proxy       – drpc-proxy HTTP server
#   worker      – drpc-worker Kafka consumer (real upstream)
#   worker-mock – drpc-worker Kafka consumer (mock upstream, no real RPC calls)
#
# Quick start:
#   docker compose up -d
#
# Mock load-test only (no real upstream calls):
#   docker compose up -d kafka redis worker-mock proxy
#
# Register ECS resources against LocalStack:
#   docker compose up -d localstack && ./deploy/localstack/bootstrap.sh

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  localstack:
    image: localstack/localstack:3
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=ecs,ecr,logs,secretsmanager,iam
      - AWS_DEFAULT_REGION=us-east-1
      # Mount Docker socket so LocalStack Pro can run actual Fargate tasks.
      # On Community edition tasks are registered but not scheduled.
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack-data:/var/lib/localstack
    networks:
      - drpc

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode – no Zookeeper required.
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=4
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - drpc

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - drpc

  # ── Application containers ──────────────────────────────────────────────────

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    image: drpc-proxy:local
    container_name: drpc-proxy
    ports:
      - "8545:8545"
    command: ["proxy", "--port", "8545", "--kafka", "kafka:9092", "--redis", "redis:6379"]
    environment:
      - GOGC=100
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - drpc

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: drpc-worker:local
    container_name: drpc-worker
    command: ["run", "--kafka", "kafka:9092", "--redis", "redis:6379",
              "--group", "rpc-workers", "--workers", "20"]
    environment:
      - GOGC=100
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - drpc

  # Drop-in mock worker — no real upstream calls, fast local load testing.
  worker-mock:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: drpc-worker:local
    container_name: drpc-worker-mock
    command: ["run", "--kafka", "kafka:9092", "--redis", "redis:6379",
              "--group", "rpc-workers-mock", "--workers", "20", "--mock"]
    environment:
      - GOGC=100
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - mock
    networks:
      - drpc

volumes:
  kafka-data:
  localstack-data:

networks:
  drpc:
    driver: bridge
