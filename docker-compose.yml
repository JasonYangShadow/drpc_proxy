# docker-compose.yml
#
# Simulates the full Fargate deployment locally.
#
# Services:
#   localstack  – AWS API emulator (ECS, ECR, CloudWatch Logs, Secrets Manager)
#   kafka       – Apache Kafka (KRaft mode, no Zookeeper)
#   redis       – Redis 7
#   proxy       – drpc-proxy HTTP server
#   worker      – drpc-worker Kafka consumer (real upstream)
#   worker-mock – drpc-worker Kafka consumer (mock upstream, no real RPC calls)
#
# Quick start:
#   docker compose up -d
#
# Mock load-test only (no real upstream calls):
#   docker compose up -d kafka redis worker-mock proxy
#
# Register ECS resources against LocalStack:
#   docker compose up -d localstack && ./deploy/localstack/bootstrap.sh

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  localstack:
    image: localstack/localstack-pro:latest
    container_name: localstack
    ports:
      - "4566:4566"
      - "4510-4560:4510-4560"   # ECS task port range
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - SERVICES=ecs,ecr,logs,secretsmanager,iam,ec2,elbv2
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - ECS_DOCKER_FLAGS=--network drpc_proxy_drpc   # run ECS tasks on our network
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack-data:/var/lib/localstack
    networks:
      - drpc

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode – no Zookeeper required.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Disable the new KIP-848 consumer group protocol so kafka-go v0.4.x
      # (which uses the classic protocol) works correctly with Kafka 3.7.
      KAFKA_GROUP_CONSUMER_PROTOCOL_ENABLED: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - drpc

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /opt/kafka/bin/kafka-topics.sh
      - --bootstrap-server
      - kafka:9092
      - --create
      - --if-not-exists
      - --topic
      - rpc_requests
      - --partitions
      - "3"
      - --replication-factor
      - "1"
    networks:
      - drpc

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - drpc

  # ── Application containers ──────────────────────────────────────────────────

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    image: drpc-proxy:local
    container_name: drpc-proxy
    ports:
      - "8545:8545"
    command: ["proxy", "--port", "8545", "--kafka", "kafka:9092", "--redis", "redis:6379"]
    environment:
      - GOGC=100
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - drpc

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: drpc-worker:local
    container_name: drpc-worker
    command: ["run", "--kafka", "kafka:9092", "--redis", "redis:6379",
              "--group", "rpc-workers", "--workers", "20"]
    environment:
      - GOGC=100
    ports:
      - "2112:2112"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - drpc

  # Drop-in mock worker — no real upstream calls, fast local load testing.
  worker-mock:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: drpc-worker:local
    container_name: drpc-worker-mock
    command: ["run", "--kafka", "kafka:9092", "--redis", "redis:6379",
              "--group", "rpc-workers-mock", "--workers", "20", "--mock"]
    environment:
      - GOGC=100
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - mock
    networks:
      - drpc

  # ── Monitoring ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/config/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./deploy:/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - prometheus-data:/prometheus
    networks:
      - drpc

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - drpc

volumes:
  kafka-data:
  localstack-data:
  prometheus-data:
  grafana-data:

networks:
  drpc:
    driver: bridge
