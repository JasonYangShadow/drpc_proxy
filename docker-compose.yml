# docker-compose.yml
#
# Simulates the full Fargate deployment locally.
#
# Services:
#   localstack  – AWS API emulator (ECS, ECR, CloudWatch Logs, Secrets Manager)
#   kafka       – Apache Kafka (KRaft mode, no Zookeeper)
#   redis       – Redis 7
#   prometheus  – metrics scraping (port 9090)
#   grafana     – dashboards (port 3000)
#
# Application containers (proxy, worker) are NOT started here.
# They are deployed by Terraform via LocalStack ECS (task local:apply / local:apply:mock).
# LocalStack spawns them as Docker containers named ls-ecs-drpc-local-*.
#
# Quick start:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  localstack:
    image: localstack/localstack-pro:latest
    container_name: localstack
    ports:
      - "4566:4566"
      - "4510-4560:4510-4560"   # ECS task port range
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - SERVICES=ecs,ecr,logs,secretsmanager,iam,ec2,elbv2
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - ECS_DOCKER_FLAGS=--network drpc_proxy_drpc   # run ECS tasks on our network
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack-data:/var/lib/localstack
    networks:
      - drpc

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode – no Zookeeper required.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Disable the new KIP-848 consumer group protocol so kafka-go v0.4.x
      # (which uses the classic protocol) works correctly with Kafka 3.7.
      KAFKA_GROUP_CONSUMER_PROTOCOL_ENABLED: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - drpc

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /opt/kafka/bin/kafka-topics.sh
      - --bootstrap-server
      - kafka:9092
      - --create
      - --if-not-exists
      - --topic
      - rpc_requests
      - --partitions
      - "3"
      - --replication-factor
      - "1"
    networks:
      - drpc

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - drpc

  # ── Monitoring ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - prometheus-config:/etc/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - prometheus-data:/prometheus
    depends_on:
      prometheus-config-init:
        condition: service_completed_successfully
    networks:
      - drpc

  prometheus-config-init:
    image: alpine:latest
    container_name: prometheus-config-init
    volumes:
      - prometheus-config:/etc/prometheus
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/prometheus/prometheus.yml << 'EOF'
        global:
          scrape_interval: 15s
          evaluation_interval: 15s

        scrape_configs:
          - job_name: 'drpc-proxy-ecs'
            docker_sd_configs:
              - host: unix:///var/run/docker.sock
                refresh_interval: 10s
            relabel_configs:
              - source_labels: [__meta_docker_container_name]
                regex: /ls-ecs-drpc-local-.*
                action: keep
              - source_labels: [__meta_docker_network_ip]
                regex: (.+)
                replacement: '$1:8545'
                target_label: __address__
              - source_labels: [__meta_docker_container_name]
                target_label: instance

          - job_name: 'drpc-worker-ecs'
            docker_sd_configs:
              - host: unix:///var/run/docker.sock
                refresh_interval: 10s
            relabel_configs:
              - source_labels: [__meta_docker_container_name]
                regex: /ls-ecs-drpc-local-.*
                action: keep
              - source_labels: [__meta_docker_network_ip]
                regex: (.+)
                replacement: '$1:2112'
                target_label: __address__
              - source_labels: [__meta_docker_container_name]
                target_label: instance
        EOF
        echo "Prometheus config written."
    networks:
      - drpc

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - drpc

volumes:
  kafka-data:
  localstack-data:
  prometheus-config:
  prometheus-data:
  grafana-data:

networks:
  drpc:
    driver: bridge
