# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  PROXY_BIN: bin/proxy
  WORKER_BIN: bin/worker
  GO_FLAGS: -mod=vendor

env:
  CGO_ENABLED: "0"

tasks:
  # ============================================================
  # PUBLIC — shown in `task --list`
  # ============================================================

  default:
    desc: "Build both binaries (default)"
    deps: [_build]

  build:
    desc: "Build proxy and worker binaries → bin/"
    deps: [_build]

  test:
    desc: "Run all unit tests with race detector"
    deps: [_test:unit]

  lint:
    desc: "Run go vet across all packages"
    deps: [_vet]

  clean:
    desc: "Remove build artifacts (bin/)"
    cmds:
      - rm -rf bin/

  # ── Local stack ───────────────────────────────────────────────────────────

  dev:up:
    desc: "Start full local stack: Kafka, Redis, LocalStack, proxy, worker"
    cmds:
      - task: _docker:build
      - docker compose up -d
      - task: _network:join

  dev:up:mock:
    desc: "Start local stack with mock worker (no real upstream — load testing)"
    cmds:
      - task: _docker:build
      - docker compose --profile mock up -d proxy worker-mock kafka redis
      - task: _network:join

  dev:up:infra:
    desc: "Start infrastructure only: Kafka, Redis, LocalStack (no app containers)"
    cmds:
      - docker compose up -d kafka redis localstack
      - task: _network:join

  dev:down:
    desc: "Stop and remove all local stack containers"
    cmds:
      - docker compose down

  dev:logs:
    desc: "Follow logs for all containers (Ctrl-C to stop)"
    cmds:
      - docker compose logs -f

  dev:status:
    desc: "Show running containers and LocalStack resource status"
    cmds:
      - task: _status

  # ── Terraform / AWS ───────────────────────────────────────────────────────

  infra:init:
    desc: "terraform init — download providers (run once)"
    deps: [_tf:init]

  infra:local:
    desc: "Apply Terraform against LocalStack (auto-approve)"
    deps: [_tf:local:apply]

  infra:local:destroy:
    desc: "Destroy all LocalStack Terraform resources (auto-approve)"
    deps: [_tf:local:destroy]

  infra:plan:
    desc: "terraform plan against real AWS"
    deps: [_tf:plan]

  infra:apply:
    desc: "terraform apply against real AWS (prompts for confirmation)"
    deps: [_tf:apply]

  infra:destroy:
    desc: "terraform destroy real AWS resources (prompts for confirmation)"
    deps: [_tf:destroy]

  infra:push:
    desc: "Build images and push to ECR (real AWS). Optionally: task infra:push IMAGE_TAG=v1.2.3"
    deps: [_tf:push]

  # ============================================================
  # INTERNAL — hidden from `task --list`
  # ============================================================

  _build:
    internal: true
    cmds:
      - mkdir -p bin
      - go build {{.GO_FLAGS}} -o {{.PROXY_BIN}} ./cmd/proxy
      - go build {{.GO_FLAGS}} -o {{.WORKER_BIN}} ./cmd/worker

  _test:unit:
    internal: true
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test {{.GO_FLAGS}} -v -race -count=1 -timeout 60s ./internal/...

  _test:e2e:
    internal: true
    cmds:
      - go test {{.GO_FLAGS}} -v -tags e2e -timeout 120s ./tests/e2e/

  _vet:
    internal: true
    cmds:
      - go vet {{.GO_FLAGS}} ./...

  _docker:build:
    internal: true
    cmds:
      - docker build -f Dockerfile.proxy -t drpc-proxy:local .
      - docker build -f Dockerfile.worker -t drpc-worker:local .

  _network:join:
    internal: true
    cmds:
      - |
        NETWORK=drpc_proxy_drpc
        SELF=$(cat /proc/self/mountinfo 2>/dev/null | grep -o '/containers/[a-f0-9]\{64\}' | head -1 | xargs basename 2>/dev/null | cut -c1-12)
        [ -z "$SELF" ] && SELF=$(cat /proc/1/cpuset 2>/dev/null | grep -o '[a-f0-9]\{64\}' | head -1 | cut -c1-12)
        [ -z "$SELF" ] && SELF=$(hostname)
        [ -z "$SELF" ] && exit 0
        docker network connect "$NETWORK" "$SELF" 2>/dev/null \
          && echo "Joined Docker network: $NETWORK" \
          || echo "Already on network: $NETWORK"

  _status:
    internal: true
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    cmds:
      - |
        echo "=== Containers ==="
        docker compose ps
        echo ""
        echo "=== LocalStack Health ==="
        curl -s http://localstack:4566/_localstack/health | python3 -m json.tool | grep -E '"(iam|logs|secretsmanager|sts|s3)": ' || echo "(LocalStack not running)"
        echo ""
        echo "=== Secrets ==="
        aws --endpoint-url=http://localstack:4566 secretsmanager list-secrets --query 'SecretList[].Name' --output table 2>/dev/null || true
        echo ""
        echo "=== CloudWatch Log Groups ==="
        aws --endpoint-url=http://localstack:4566 logs describe-log-groups --query 'logGroups[].logGroupName' --output table 2>/dev/null || true

  _tf:init:
    internal: true
    dir: terraform
    cmds:
      - terraform init

  _tf:plan:
    internal: true
    dir: terraform
    cmds:
      - terraform plan

  _tf:apply:
    internal: true
    dir: terraform
    cmds:
      - terraform apply

  _tf:destroy:
    internal: true
    dir: terraform
    cmds:
      - terraform destroy

  _tf:local:apply:
    internal: true
    dir: terraform
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    cmds:
      - terraform init -input=false
      - terraform apply -var-file=localstack.tfvars -auto-approve

  _tf:local:destroy:
    internal: true
    dir: terraform
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    cmds:
      - terraform destroy -var-file=localstack.tfvars -auto-approve

  _tf:push:
    internal: true
    dir: terraform
    vars:
      PROXY_URL:
        sh: terraform output -raw proxy_ecr_repository_url
      WORKER_URL:
        sh: terraform output -raw worker_ecr_repository_url
      REGION:
        sh: terraform output -raw aws_region 2>/dev/null || echo "us-east-1"
    cmds:
      - aws ecr get-login-password --region {{.REGION}} | docker login --username AWS --password-stdin {{.PROXY_URL}}
      - docker build -f ../Dockerfile.proxy -t {{.PROXY_URL}}:{{.IMAGE_TAG | default "latest"}} ..
      - docker push {{.PROXY_URL}}:{{.IMAGE_TAG | default "latest"}}
      - docker build -f ../Dockerfile.worker -t {{.WORKER_URL}}:{{.IMAGE_TAG | default "latest"}} ..
      - docker push {{.WORKER_URL}}:{{.IMAGE_TAG | default "latest"}}
