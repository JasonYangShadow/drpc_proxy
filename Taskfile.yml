# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  GO_FLAGS: -mod=vendor

tasks:
  # ── Docker Compose ──────────────────────────────────────────────────────────

  docker:up:
    desc: "Start infrastructure: Kafka, Redis, LocalStack"
    cmds:
      - docker compose up -d kafka kafka-init redis localstack
      - task: _network:join

  docker:down:
    desc: "Stop and remove all local stack containers"
    cmds:
      - docker compose down

  docker:logs:
    desc: "Follow logs for all containers (Ctrl-C to stop)"
    cmds:
      - docker compose logs -f

  docker:logs:proxy:
    desc: "Follow logs of the running ECS proxy container"
    cmds:
      - |
        IDS=$(docker ps -q)
        [ -z "$IDS" ] && echo "No ECS containers running" && exit 1
        NAME=$(docker inspect $IDS 2>/dev/null | python3 -c "import sys,json; cs=json.load(sys.stdin); r=[c['Id'][:12] for c in cs if 'drpc-local-proxy' in c.get('Config',{}).get('Image','')]; print(r[0] if r else '')")
        [ -z "$NAME" ] && echo "No proxy container running" && exit 1
        echo "Following logs for: $NAME"
        docker logs -f "$NAME"

  docker:logs:worker:
    desc: "Follow logs of the running ECS worker container"
    cmds:
      - |
        IDS=$(docker ps -q)
        [ -z "$IDS" ] && echo "No ECS containers running" && exit 1
        NAME=$(docker inspect $IDS 2>/dev/null | python3 -c "import sys,json; cs=json.load(sys.stdin); r=[c['Id'][:12] for c in cs if 'drpc-local-worker' in c.get('Config',{}).get('Image','')]; print(r[0] if r else '')")
        [ -z "$NAME" ] && echo "No worker container running" && exit 1
        echo "Following logs for: $NAME"
        docker logs -f "$NAME"

  # ── Terraform (LocalStack) ────────────────────────────────────────────────

  local:init:
    desc: "terraform init for LocalStack — download providers (run once)"
    deps: [_tf:init]

  local:apply:
    desc: "Apply Terraform against LocalStack with real worker (auto-approve)"
    deps: [_tf:local:apply]

  local:apply:mock:
    desc: "Apply Terraform against LocalStack with mock worker, no real upstream (auto-approve)"
    cmds:
      - task: _tf:local:apply
        vars: { TF_EXTRA_ARGS: "-var worker_mock=true" }

  local:destroy:
    desc: "Destroy all LocalStack Terraform resources (auto-approve)"
    deps: [_tf:local:destroy]

  local:push:
    desc: "Build images and push to LocalStack ECR. Optionally: task local:push IMAGE_TAG=v1.2.3"
    deps: [_tf:push:local]

  # ── Terraform (real AWS) ──────────────────────────────────────────────────

  infra:init:
    desc: "terraform init — download providers (run once)"
    deps: [_tf:init]

  infra:plan:
    desc: "terraform plan against real AWS"
    deps: [_tf:plan]

  infra:apply:
    desc: "terraform apply against real AWS (prompts for confirmation)"
    deps: [_tf:apply]

  infra:destroy:
    desc: "terraform destroy real AWS resources (prompts for confirmation)"
    deps: [_tf:destroy]

  infra:push:
    desc: "Build images and push to ECR (real AWS). Optionally: task infra:push IMAGE_TAG=v1.2.3"
    deps: [_tf:push]

  # ── Tests ─────────────────────────────────────────────────────────────────

  test:e2e:
    desc: "Run e2e tests against a running LocalStack deployment (auto-detects proxy IP)"
    cmds:
      - |
        if [ -n "$PROXY_ADDR" ]; then
          ADDR="$PROXY_ADDR"
        else
          IDS=$(docker ps -q)
          PROXY_IP=$(docker inspect $IDS 2>/dev/null | python3 -c "import sys,json; cs=json.load(sys.stdin); r=[list(c.get('NetworkSettings',{}).get('Networks',{}).values())[0]['IPAddress'] for c in cs if 'drpc-local-proxy' in c.get('Config',{}).get('Image','') and c.get('NetworkSettings',{}).get('Networks',{})]; print(r[0] if r else '')")
          [ -z "$PROXY_IP" ] && echo "No proxy container found — run task local:push first" && exit 1
          ADDR="http://$PROXY_IP:8545"
        fi
        echo "Running e2e tests against $ADDR"
        PROXY_ADDR="$ADDR" go test {{.GO_FLAGS}} -v -tags e2e -timeout 120s ./tests/e2e/

  # ============================================================
  # INTERNAL — hidden from `task --list`
  # ============================================================

  _network:join:
    internal: true
    cmds:
      - |
        NETWORK=drpc_proxy_drpc
        SELF=$(cat /proc/self/mountinfo 2>/dev/null | grep -o '/containers/[a-f0-9]\{64\}' | head -1 | xargs basename 2>/dev/null | cut -c1-12)
        [ -z "$SELF" ] && SELF=$(cat /proc/1/cpuset 2>/dev/null | grep -o '[a-f0-9]\{64\}' | head -1 | cut -c1-12)
        [ -z "$SELF" ] && SELF=$(hostname)
        [ -z "$SELF" ] && exit 0
        docker network connect "$NETWORK" "$SELF" 2>/dev/null \
          && echo "Joined Docker network: $NETWORK" \
          || echo "Already on network: $NETWORK"

  _tf:init:
    internal: true
    dir: terraform
    cmds:
      - terraform init

  _tf:plan:
    internal: true
    dir: terraform
    cmds:
      - terraform plan

  _tf:apply:
    internal: true
    dir: terraform
    cmds:
      - terraform apply

  _tf:destroy:
    internal: true
    dir: terraform
    cmds:
      - terraform destroy

  _tf:local:apply:
    internal: true
    dir: terraform
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    cmds:
      - terraform init -input=false
      # LocalStack is ephemeral — wipe any stale state from a previous run
      # so Terraform recreates all resources from scratch.
      - |
        RESOURCES=$(terraform state list 2>/dev/null | tr '\n' ' ')
        if [ -n "$RESOURCES" ]; then
          echo "Clearing stale LocalStack state..."
          terraform state rm $RESOURCES
        fi
      - terraform apply -var-file=localstack.tfvars -auto-approve {{.TF_EXTRA_ARGS}}

  _tf:local:destroy:
    internal: true
    dir: terraform
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    cmds:
      # Scale services to 0 first so Terraform doesn't hang waiting for task draining.
      - |
        CLUSTER=$(terraform output -raw ecs_cluster_name 2>/dev/null || true)
        if [ -n "$CLUSTER" ]; then
          for SVC in $(aws --endpoint-url=http://localstack:4566 ecs list-services --cluster "$CLUSTER" --query 'serviceArns[]' --output text 2>/dev/null); do
            aws --endpoint-url=http://localstack:4566 ecs update-service --cluster "$CLUSTER" --service "$SVC" --desired-count 0 >/dev/null 2>&1 || true
          done
        fi
      - terraform destroy -var-file=localstack.tfvars -auto-approve -refresh=false

  _tf:push:
    internal: true
    dir: terraform
    vars:
      PROXY_URL:
        sh: terraform output -raw proxy_ecr_repository_url
      WORKER_URL:
        sh: terraform output -raw worker_ecr_repository_url
      REGION:
        sh: terraform output -raw aws_region 2>/dev/null || echo "us-east-1"
    cmds:
      - aws ecr get-login-password --region {{.REGION}} | docker login --username AWS --password-stdin {{.PROXY_URL}}
      - docker build -f ../Dockerfile.proxy -t {{.PROXY_URL}}:{{.IMAGE_TAG | default "latest"}} ..
      - docker push {{.PROXY_URL}}:{{.IMAGE_TAG | default "latest"}}
      - docker build -f ../Dockerfile.worker -t {{.WORKER_URL}}:{{.IMAGE_TAG | default "latest"}} ..
      - docker push {{.WORKER_URL}}:{{.IMAGE_TAG | default "latest"}}

  _tf:push:local:
    internal: true
    dir: terraform
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    vars:
      PROXY_URL:
        sh: terraform output -raw proxy_ecr_repository_url
      WORKER_URL:
        sh: terraform output -raw worker_ecr_repository_url
    cmds:
      - aws --endpoint-url=http://localstack:4566 ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin {{.PROXY_URL}}
      - docker build -f ../Dockerfile.proxy -t {{.PROXY_URL}}:{{.IMAGE_TAG | default "latest"}} ..
      - docker push {{.PROXY_URL}}:{{.IMAGE_TAG | default "latest"}}
      - docker build -f ../Dockerfile.worker -t {{.WORKER_URL}}:{{.IMAGE_TAG | default "latest"}} ..
      - docker push {{.WORKER_URL}}:{{.IMAGE_TAG | default "latest"}}
